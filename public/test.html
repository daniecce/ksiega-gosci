<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>Test typów plików</title>
  <style>
    body { font-family: system-ui; max-width: 800px; margin: 40px auto; padding: 0 20px; }
    h1 { font-size: 20px; }
    .ok { color: #16a34a; }
    .blad { color: #dc2626; }
    .pominiety { color: #d97706; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    th, td { text-align: left; padding: 8px 12px; border-bottom: 1px solid #e5e7eb; font-size: 14px; }
    th { background: #f9fafb; font-weight: 600; }
    button { background: black; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-size: 14px; }
    #wyniki { margin-top: 20px; }
    .podsumowanie { margin-top: 20px; padding: 16px; background: #f9fafb; border-radius: 8px; font-size: 14px; }
  </style>
</head>
<body>

<h1>Test walidacji typów plików</h1>
<p style="color:#6b7280;font-size:14px">Testuje czy aplikacja poprawnie akceptuje i odrzuca pliki po stronie klienta i serwera.</p>

<button onclick="uruchomTesty()">▶ Uruchom testy</button>

<div id="wyniki"></div>

<script>
const DOZWOLONE_TYPY = [
  "image/jpeg", "image/jpg", "image/heic", "image/heif",
  "image/png", "image/webp", "image/dng", "image/x-adobe-dng",
  "image/gif", "image/bmp", "video/quicktime", "video/mp4",
  "video/x-msvideo", "video/x-matroska", "video/webm", "video/3gpp",
]

// Typy które POWINNY być zaakceptowane
const POWINNY_PRZEJSC = [
  { typ: "image/jpeg",        rozszerzenie: ".jpg",  opis: "Zdjęcie JPEG" },
  { typ: "image/jpg",         rozszerzenie: ".jpg",  opis: "Zdjęcie JPG" },
  { typ: "image/heic",        rozszerzenie: ".heic", opis: "iPhone HEIC" },
  { typ: "image/heif",        rozszerzenie: ".heif", opis: "iPhone HEIF" },
  { typ: "image/png",         rozszerzenie: ".png",  opis: "Zdjęcie PNG" },
  { typ: "image/webp",        rozszerzenie: ".webp", opis: "Zdjęcie WebP" },
  { typ: "image/dng",         rozszerzenie: ".dng",  opis: "ProRAW DNG (małe)" },
  { typ: "image/DNG",         rozszerzenie: ".dng",  opis: "ProRAW DNG (DUŻE litery)" },
  { typ: "image/x-adobe-dng", rozszerzenie: ".dng",  opis: "Adobe DNG" },
  { typ: "image/gif",         rozszerzenie: ".gif",  opis: "GIF" },
  { typ: "image/bmp",         rozszerzenie: ".bmp",  opis: "BMP" },
  { typ: "video/quicktime",   rozszerzenie: ".mov",  opis: "iPhone wideo MOV" },
  { typ: "video/mp4",         rozszerzenie: ".mp4",  opis: "Wideo MP4" },
  { typ: "video/x-msvideo",   rozszerzenie: ".avi",  opis: "Wideo AVI" },
  { typ: "video/x-matroska",  rozszerzenie: ".mkv",  opis: "Wideo MKV" },
  { typ: "video/webm",        rozszerzenie: ".webm", opis: "Wideo WebM" },
  { typ: "video/3gpp",        rozszerzenie: ".3gp",  opis: "Wideo 3GP (stare Android)" },
  { typ: "VIDEO/MP4",         rozszerzenie: ".mp4",  opis: "MP4 (DUŻE litery)" },
]

// Typy które POWINNY być odrzucone
const POWINNY_BYCD_ODRZUCONE = [
  { typ: "application/pdf",        rozszerzenie: ".pdf",  opis: "PDF" },
  { typ: "application/zip",        rozszerzenie: ".zip",  opis: "ZIP" },
  { typ: "text/plain",             rozszerzenie: ".txt",  opis: "Plik tekstowy" },
  { typ: "application/javascript", rozszerzenie: ".js",   opis: "JavaScript" },
  { typ: "application/exe",        rozszerzenie: ".exe",  opis: "Executable" },
  { typ: "text/html",              rozszerzenie: ".html", opis: "HTML" },
]

function sprawdzTypKlient(typ) {
  return DOZWOLONE_TYPY.includes(typ.toLowerCase())
}

async function sprawdzTypSerwer(typ, nazwa, rozmiar = 1024) {
  try {
    const odpowiedz = await fetch("/api/presign", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ nazwa, typ, rozmiar }),
    })
    const dane = await odpowiedz.json()
    return {
      ok: dane.ok === true,
      komunikat: dane.error || "OK",
      status: odpowiedz.status,
    }
  } catch (err) {
    return { ok: false, komunikat: err.message, status: 0 }
  }
}

async function uruchomTesty() {
  const kontener = document.getElementById("wyniki")
  kontener.innerHTML = "<p style='color:#6b7280;font-size:14px'>Trwa testowanie...</p>"

  let html = `
    <table>
      <thead>
        <tr>
          <th>Typ pliku</th>
          <th>Opis</th>
          <th>Klient</th>
          <th>Serwer</th>
          <th>Wynik</th>
        </tr>
      </thead>
      <tbody>
  `

  let zaliczone = 0
  let oblane = 0

  // Testuj typy które POWINNY przejść
  for (const test of POWINNY_PRZEJSC) {
    const klient = sprawdzTypKlient(test.typ)
    const serwer = await sprawdzTypSerwer(test.typ, `test${test.rozszerzenie}`)

    const klientOk = klient === true
    const serwerOk = serwer.ok === true
    const obaDobre = klientOk && serwerOk

    if (obaDobre) zaliczone++
    else oblane++

    html += `
      <tr>
        <td><code style="font-size:12px">${test.typ}</code></td>
        <td>${test.opis}</td>
        <td class="${klientOk ? 'ok' : 'blad'}">${klientOk ? '✅ OK' : '❌ Zablokowany'}</td>
        <td class="${serwerOk ? 'ok' : 'blad'}">${serwerOk ? '✅ OK' : `❌ ${serwer.komunikat}`}</td>
        <td class="${obaDobre ? 'ok' : 'blad'}">${obaDobre ? '✅ Przeszedł' : '❌ Oblany'}</td>
      </tr>
    `
  }

  // Separator
  html += `
    <tr>
      <td colspan="5" style="background:#fef3c7;color:#92400e;font-size:12px;font-weight:600;padding:8px 12px">
        PONIŻSZE TYPY POWINNY BYĆ ODRZUCONE
      </td>
    </tr>
  `

  // Testuj typy które POWINNY być odrzucone
  for (const test of POWINNY_BYCD_ODRZUCONE) {
    const klient = sprawdzTypKlient(test.typ)
    const serwer = await sprawdzTypSerwer(test.typ, `test${test.rozszerzenie}`)

    const klientOk = klient === false   // powinien odrzucić
    const serwerOk = serwer.ok === false  // powinien odrzucić

    if (klientOk && serwerOk) zaliczone++
    else oblane++

    html += `
      <tr>
        <td><code style="font-size:12px">${test.typ}</code></td>
        <td>${test.opis}</td>
        <td class="${klientOk ? 'ok' : 'blad'}">${klientOk ? '✅ Odrzucony' : '❌ Przepuścił!'}</td>
        <td class="${serwerOk ? 'ok' : 'blad'}">${serwerOk ? '✅ Odrzucony' : '❌ Przepuścił!'}</td>
        <td class="${klientOk && serwerOk ? 'ok' : 'blad'}">${klientOk && serwerOk ? '✅ Odrzucony' : '❌ Oblany'}</td>
      </tr>
    `
  }

  html += `</tbody></table>`

  const razem = zaliczone + oblane
  html += `
    <div class="podsumowanie">
      <strong>Wynik: ${zaliczone}/${razem} testów zaliczonych</strong>
      ${oblane > 0
        ? `<br><span class="blad">${oblane} testów oblanych — sprawdź czerwone wiersze</span>`
        : `<br><span class="ok">Wszystkie testy zaliczone! ✅</span>`
      }
    </div>
  `

  kontener.innerHTML = html
}
</script>

</body>
</html>
